<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E2761">
<title>NCHU MCP Workshop · 課程小助教</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎓%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/atom-one-light.min.css" media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/atom-one-dark.min.css" media="(prefers-color-scheme: dark)">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
<style>
  :root {
    --navy:   #1E2761;
    --deep:   #065A82;
    --teal:   #1C7293;
    --orange: #E8793A;
    --cream:  #FAF7F2;
    --bg:     #F4F6FB;
    --surface:#FFFFFF;
    --user-bg:#E0E9F5;
    --text:   #1A2434;
    --muted:  #5A6678;
    --border: #E2E8F0;
    --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 4px 24px rgba(15, 23, 42, 0.04);
    --radius: 14px;
    --font-sans: 'Inter', 'Noto Sans TC', system-ui, -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:     #0E1320;
      --surface:#171C2C;
      --user-bg:#243152;
      --text:   #E5E9F0;
      --muted:  #9AA4B5;
      --border: #2A3144;
      --cream:  #1F2435;
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 24px rgba(0,0,0,0.2);
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--text);
    background: var(--bg);
    background-image:
      radial-gradient(circle at 0% 0%, rgba(30, 39, 97, 0.06), transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(28, 114, 147, 0.06), transparent 50%);
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--deep) 60%, var(--teal) 100%);
    color: white;
    padding: 1.25rem 1.5rem;
    box-shadow: 0 2px 12px rgba(30, 39, 97, 0.18);
    flex-shrink: 0;
  }
  .header-inner {
    max-width: 920px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 0.85rem;
  }
  .logo {
    width: 42px; height: 42px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 1.35rem;
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }
  .header-text h1 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.25;
  }
  .header-text .sub {
    margin: 0;
    font-size: 0.78rem;
    color: rgba(255, 255, 255, 0.78);
    font-weight: 500;
  }
  .badge {
    margin-left: auto;
    font-size: 0.7rem;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    background: rgba(232, 121, 58, 0.85);
    padding: 0.25rem 0.6rem;
    border-radius: 999px;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .header-action {
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: background 0.15s, transform 0.15s;
    margin-left: 0.4rem;
    flex-shrink: 0;
  }
  .header-action:hover { background: rgba(255, 255, 255, 0.25); }
  .header-action:active { transform: scale(0.95); }
  .header-action svg { width: 16px; height: 16px; }
  .header-action[disabled] { opacity: 0.4; cursor: not-allowed; }

  /* ── Main scroll area ──────────────────────────── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem 0;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  /* ── Empty state (hero) ────────────────────────── */
  .hero {
    text-align: center;
    padding: 1.5rem 0.5rem 2rem;
  }
  .hero-emoji { font-size: 2.6rem; margin-bottom: 0.4rem; }
  .hero h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0 0 0.4rem;
    letter-spacing: -0.015em;
    background: linear-gradient(120deg, var(--navy), var(--teal));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    color: var(--muted);
    font-size: 0.92rem;
    margin: 0 auto;
    max-width: 480px;
  }
  .examples {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 0.6rem;
    margin: 1.6rem auto 0;
    max-width: 760px;
  }
  .example-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    font-size: 0.88rem;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    line-height: 1.4;
    box-shadow: var(--shadow);
  }
  .example-card:hover {
    transform: translateY(-1px);
    border-color: var(--teal);
    box-shadow: 0 2px 6px rgba(30, 39, 97, 0.08), 0 8px 24px rgba(28, 114, 147, 0.12);
  }
  .example-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
  }
  .example-text { font-weight: 500; }

  /* ── Message bubbles ───────────────────────────── */
  .msg-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    align-items: flex-start;
    animation: fade-in 0.25s ease-out;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-col {
    display: flex;
    flex-direction: column;
    min-width: 0;
    max-width: 78%;
  }
  .msg-row.user .msg-col { align-items: flex-end; }
  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: grid; place-items: center;
    flex-shrink: 0;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .avatar.assistant {
    background: linear-gradient(135deg, var(--navy), var(--teal));
    color: white;
  }
  .avatar.user {
    background: var(--user-bg);
    color: var(--deep);
  }
  .bubble {
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    line-height: 1.6;
    word-wrap: break-word;
    font-size: 0.94rem;
  }
  .msg-row.user .bubble {
    background: var(--user-bg);
    color: var(--text);
    border-bottom-right-radius: 4px;
    white-space: pre-wrap;
  }
  .msg-row.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }
  .bubble :first-child { margin-top: 0; }
  .bubble :last-child { margin-bottom: 0; }
  .bubble p { margin: 0.5rem 0; }
  .bubble code {
    background: var(--cream);
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 0.85em;
    border: 1px solid var(--border);
  }
  .bubble pre {
    background: var(--cream);
    padding: 0.85rem;
    border-radius: 8px;
    overflow-x: auto;
    border: 1px solid var(--border);
    margin: 0.5rem 0;
    font-family: var(--font-mono);
    font-size: 0.82rem;
  }
  .bubble pre code,
  .bubble pre code.hljs {
    background: transparent;
    padding: 0;
    border: 0;
    font-size: 1em;
    color: inherit;
  }
  .bubble ul, .bubble ol { padding-left: 1.4rem; margin: 0.4rem 0; }
  .bubble li { margin: 0.2rem 0; }
  .bubble strong { color: var(--navy); font-weight: 700; }
  @media (prefers-color-scheme: dark) {
    .bubble strong { color: #88B4FF; }
  }
  .bubble a { color: var(--deep); text-decoration: none; border-bottom: 1px solid currentColor; }

  .tool-call {
    font-size: 0.74rem;
    color: var(--muted);
    background: var(--cream);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 0.35rem 0.6rem;
    margin-bottom: 0.5rem;
    display: inline-block;
    font-family: var(--font-mono);
    align-self: flex-start;
    max-width: 100%;
    overflow-x: auto;
    white-space: nowrap;
  }
  .tool-call::before { content: '🔧 '; }

  .timestamp {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 0.3rem;
    font-variant-numeric: tabular-nums;
    padding: 0 0.3rem;
  }

  .actions {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.4rem;
    flex-wrap: wrap;
  }
  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.3rem 0.65rem;
    border-radius: 7px;
    font-size: 0.74rem;
    font-family: inherit;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    transition: all 0.15s;
  }
  .action-btn:hover {
    border-color: var(--teal);
    color: var(--deep);
    background: var(--surface);
  }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .action-btn.copied { color: #16A34A; border-color: #86EFAC; background: #F0FDF4; }
  .action-btn svg { width: 12px; height: 12px; }

  /* Loading dots */
  .typing { display: inline-flex; gap: 0.25rem; padding: 0.35rem 0; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input footer ──────────────────────────────── */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.85rem 1rem 0.85rem;
    flex-shrink: 0;
    box-shadow: 0 -2px 12px rgba(15, 23, 42, 0.04);
  }
  .input-wrap {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 0.6rem;
    align-items: flex-end;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 0.5rem 0.5rem 0.5rem 0.85rem;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(28, 114, 147, 0.12);
  }
  textarea {
    flex: 1;
    border: 0;
    background: transparent;
    resize: none;
    outline: none;
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--text);
    line-height: 1.5;
    padding: 0.4rem 0;
    max-height: 140px;
    min-height: 24px;
  }
  textarea::placeholder { color: var(--muted); }
  button.send {
    background: linear-gradient(135deg, var(--deep), var(--teal));
    color: white;
    border: 0;
    border-radius: 12px;
    width: 38px; height: 38px;
    display: grid; place-items: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  button.send:hover:not(:disabled) { transform: scale(1.05); }
  button.send:disabled { opacity: 0.4; cursor: not-allowed; }
  .hint {
    max-width: 760px;
    margin: 0.5rem auto 0;
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .hint kbd {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0 0.3rem;
    font-family: var(--font-mono);
    font-size: 0.66rem;
  }

  /* Responsive */
  @media (max-width: 480px) {
    header { padding: 0.85rem 1rem; }
    .header-text h1 { font-size: 0.95rem; }
    .header-text .sub { font-size: 0.7rem; }
    .badge { display: none; }
    main { padding: 1rem 0.75rem 0; }
    .msg-col { max-width: 88%; }
    .bubble { font-size: 0.92rem; }
    .examples { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">🎓</div>
    <div class="header-text">
      <h1>NCHU MCP Workshop · 課程小助教</h1>
      <p class="sub">課程概念 · Lab 操作 · mini-project 程式碼</p>
    </div>
    <div class="badge">Powered by Claude</div>
    <button class="header-action" id="clear-btn" title="清空對話" aria-label="清空對話">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="container" id="container"></div>
</main>

<footer>
  <form class="input-wrap" id="form">
    <textarea id="msg" rows="1" placeholder="例：N×M 痛點是什麼？／ setup.sh 卡住了該怎麼辦？"></textarea>
    <button type="submit" class="send" id="send" aria-label="送出">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </form>
  <div class="hint"><kbd>Enter</kbd> 換行 · <kbd>⌘/Ctrl + Enter</kbd> 送出 · NCHU MCP Workshop 2026</div>
</footer>

<script>
  marked.setOptions({ breaks: true, gfm: true });

  const HERO_HTML = `
    <div class="hero" id="hero">
      <div class="hero-emoji">💬</div>
      <h2>有什麼想問的？</h2>
      <p>我熟讀 5 段投影片、3 關 Lab 手冊、整份 mini-project 原始碼。直接問我吧。</p>
      <div class="examples">
        <button class="example-card" data-q="RAG 跟 Tool Use 差在哪？什麼時候該用哪個？">
          <span class="example-tag">概念</span><div class="example-text">RAG 跟 Tool Use 差在哪？</div>
        </button>
        <button class="example-card" data-q="MCP 解決了什麼 N×M 的問題？為什麼不直接用 Tool Use？">
          <span class="example-tag">概念</span><div class="example-text">MCP 解了什麼 N×M 痛點？</div>
        </button>
        <button class="example-card" data-q="agent loop 是怎麼跑的？stop_reason=tool_use 是什麼意思？">
          <span class="example-tag">概念</span><div class="example-text">agent loop 怎麼跑？</div>
        </button>
        <button class="example-card" data-q="JSON-RPC 是什麼？為什麼 MCP 選它而不是 REST？">
          <span class="example-tag">概念</span><div class="example-text">JSON-RPC 為什麼勝出？</div>
        </button>
        <button class="example-card" data-q="L1 怎麼換成我自己領域的資料？步驟給我">
          <span class="example-tag">Lab</span><div class="example-text">L1 換自己領域資料？</div>
        </button>
        <button class="example-card" data-q="L1 Step 3 要怎麼改 docstring？三個關鍵元素是什麼？">
          <span class="example-tag">Lab</span><div class="example-text">L1 Step 3 docstring 怎麼改？</div>
        </button>
        <button class="example-card" data-q="setup.sh 跑出來不是 5/5 ✅，常見原因有哪些？">
          <span class="example-tag">Lab</span><div class="example-text">setup.sh 卡住怎麼辦？</div>
        </button>
        <button class="example-card" data-q="llm-client.js 那個 for-loop 解釋一下，maxIterations 為什麼設 5？">
          <span class="example-tag">程式碼</span><div class="example-text">llm-client.js 那個 for-loop？</div>
        </button>
        <button class="example-card" data-q="FastMCP 怎麼定義一支工具？docstring 跟 input_schema 哪個重要？">
          <span class="example-tag">程式碼</span><div class="example-text">FastMCP 怎麼定義工具？</div>
        </button>
        <button class="example-card" data-q="工具從 3 支變 239 支會出什麼問題？怎麼控制 token 成本？">
          <span class="example-tag">實務</span><div class="example-text">工具變多會怎樣？怎麼省錢？</div>
        </button>
      </div>
    </div>`;

  const main = document.querySelector('main');
  const container = document.getElementById('container');
  const form = document.getElementById('form');
  const msgEl = document.getElementById('msg');
  const sendBtn = document.getElementById('send');
  const clearBtn = document.getElementById('clear-btn');
  let messages = [];
  let inflight = false;

  // ── Helpers ──
  const ts = () => new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
  const updateClearBtn = () => { clearBtn.disabled = inflight || messages.length === 0; };
  const scrollToBottom = () => requestAnimationFrame(() => { main.scrollTop = main.scrollHeight; });

  function showHero() {
    container.innerHTML = HERO_HTML;
  }

  function avatarFor(role) {
    const div = document.createElement('div');
    div.className = 'avatar ' + role;
    div.textContent = role === 'assistant' ? 'TA' : '你';
    return div;
  }

  function highlightCode(scope) {
    scope.querySelectorAll('pre code').forEach(el => {
      try { hljs.highlightElement(el); } catch (_) {}
    });
  }

  // ── Render ──
  function renderUser(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    const col = document.createElement('div');
    col.className = 'msg-col';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const time = document.createElement('div');
    time.className = 'timestamp';
    time.textContent = ts();
    col.appendChild(bubble);
    col.appendChild(time);
    row.appendChild(avatarFor('user'));
    row.appendChild(col);
    container.appendChild(row);
    scrollToBottom();
  }

  function renderAssistant(text, toolCalls, opts = {}) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.appendChild(avatarFor('assistant'));
    const col = document.createElement('div');
    col.className = 'msg-col';

    if (toolCalls && toolCalls.length) {
      toolCalls.forEach(tc => {
        const tag = document.createElement('div');
        tag.className = 'tool-call';
        const args = tc.input ? Object.entries(tc.input).map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(', ') : '';
        tag.textContent = `${tc.name}(${args})`;
        col.appendChild(tag);
      });
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const safeText = text || '(無內容)';
    bubble.innerHTML = DOMPurify.sanitize(marked.parse(safeText));
    col.appendChild(bubble);
    highlightCode(bubble);

    const time = document.createElement('div');
    time.className = 'timestamp';
    time.textContent = ts();
    col.appendChild(time);

    if (!opts.skipActions) {
      const actions = document.createElement('div');
      actions.className = 'actions';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'action-btn';
      copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>複製</span>';
      copyBtn.addEventListener('click', () => copyToClipboard(safeText, copyBtn));

      const regenBtn = document.createElement('button');
      regenBtn.className = 'action-btn';
      regenBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span>重新生成</span>';
      regenBtn.addEventListener('click', regenerate);

      actions.appendChild(copyBtn);
      actions.appendChild(regenBtn);
      col.appendChild(actions);
    }

    row.appendChild(col);
    container.appendChild(row);
    scrollToBottom();
  }

  function renderTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = 'typing-row';
    row.appendChild(avatarFor('assistant'));
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);
    container.appendChild(row);
    scrollToBottom();
  }
  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  function renderError(msg) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.appendChild(avatarFor('assistant'));
    const col = document.createElement('div');
    col.className = 'msg-col';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.style.borderColor = '#FCA5A5';
    bubble.style.background = '#FEF2F2';
    bubble.style.color = '#991B1B';
    bubble.textContent = '⚠ ' + msg;
    col.appendChild(bubble);
    const time = document.createElement('div');
    time.className = 'timestamp';
    time.textContent = ts();
    col.appendChild(time);
    row.appendChild(col);
    container.appendChild(row);
    scrollToBottom();
  }

  // ── Re-render entire conversation from messages[] ──
  function fullRerender() {
    container.innerHTML = '';
    if (messages.length === 0) { showHero(); return; }
    let i = 0;
    while (i < messages.length) {
      const m = messages[i];
      if (m.role === 'user' && typeof m.content === 'string') {
        renderUser(m.content);
        i++;
      } else if (m.role === 'assistant') {
        const blocks = Array.isArray(m.content) ? m.content : [{ type: 'text', text: m.content }];
        const text = blocks.filter(b => b.type === 'text').map(b => b.text).join('\n');
        const tools = blocks.filter(b => b.type === 'tool_use').map(b => ({ name: b.name, input: b.input }));
        // Collapse follow-up tool_result + assistant rounds into one displayed assistant turn?
        // Simpler: just show this assistant turn; tool_result rounds will be skipped (role=user with array content)
        renderAssistant(text, tools);
        i++;
      } else {
        i++;  // skip tool_result user messages
      }
    }
  }

  // ── Copy to clipboard ──
  async function copyToClipboard(text, btn) {
    try {
      await navigator.clipboard.writeText(text);
      const orig = btn.innerHTML;
      btn.classList.add('copied');
      btn.querySelector('span').textContent = '已複製';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = orig;
      }, 1500);
    } catch (e) {
      alert('複製失敗：' + e.message);
    }
  }

  // ── Regenerate ──
  async function regenerate() {
    if (inflight) return;
    let lastUserIdx = -1;
    for (let i = messages.length - 1; i >= 0; i--) {
      if (messages[i].role === 'user' && typeof messages[i].content === 'string') {
        lastUserIdx = i;
        break;
      }
    }
    if (lastUserIdx === -1) return;
    const lastUserText = messages[lastUserIdx].content;
    messages = messages.slice(0, lastUserIdx);
    fullRerender();
    await send(lastUserText);
  }

  // ── Clear ──
  function clearChat() {
    if (inflight) return;
    if (messages.length === 0) return;
    if (!confirm('確定清空整個對話？')) return;
    messages = [];
    showHero();
    updateClearBtn();
  }
  clearBtn.addEventListener('click', clearChat);

  // ── 自動長高 + 範例卡（事件代理）──
  msgEl.addEventListener('input', () => {
    msgEl.style.height = 'auto';
    msgEl.style.height = Math.min(msgEl.scrollHeight, 140) + 'px';
  });

  container.addEventListener('click', (e) => {
    const card = e.target.closest('.example-card');
    if (card && card.dataset.q) {
      msgEl.value = card.dataset.q;
      msgEl.dispatchEvent(new Event('input'));
      msgEl.focus();
    }
  });

  // ── Send ──
  async function send(text) {
    if (!text || inflight) return;
    inflight = true;
    sendBtn.disabled = true;
    updateClearBtn();

    const heroEl = document.getElementById('hero');
    if (heroEl) heroEl.remove();

    messages.push({ role: 'user', content: text });
    renderUser(text);
    msgEl.value = '';
    msgEl.style.height = '24px';
    renderTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });
      const data = await res.json();
      removeTyping();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      // 從 server 回傳的 messages 找最後一輪 assistant 的 tool_use blocks
      const tools = [];
      for (let i = data.messages.length - 1; i >= 0; i--) {
        const m = data.messages[i];
        if (m.role === 'assistant' && Array.isArray(m.content)) {
          m.content.forEach(b => {
            if (b.type === 'tool_use') tools.push({ name: b.name, input: b.input });
          });
          break;
        }
      }
      messages = data.messages;
      renderAssistant(data.reply, tools);
    } catch (e) {
      removeTyping();
      renderError(e.message);
    } finally {
      inflight = false;
      sendBtn.disabled = false;
      updateClearBtn();
      msgEl.focus();
    }
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    send(msgEl.value.trim());
  });

  msgEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      send(msgEl.value.trim());
    }
  });

  // ── 初始化 ──
  showHero();
  updateClearBtn();
  msgEl.focus();
</script>
</body>
</html>
